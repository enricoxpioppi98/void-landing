<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID — v9</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="../" class="back">&larr; Gallery</a>
        <span class="version">v9</span>
    </nav>

    <main>
        <div class="space"></div>

        <div class="content">
            <span class="kanji">虚空</span>
            <h1>Void</h1>
            <div class="thin-line"></div>
            <p class="philosophy">In the silence between stars,<br>in the space where light surrenders,<br>there is data waiting to be seen.</p>
        </div>

        <div class="space"></div>

        <div class="bottom-section">
            <div class="bottom-left">
                <span class="label">Platform</span>
                <p>Black hole data visualization</p>
            </div>
            <div class="bottom-center">
                <div class="circle"></div>
            </div>
            <div class="bottom-right">
                <span class="label">Mission</span>
                <p>See beyond the event horizon</p>
            </div>
        </div>

        <div class="space-small"></div>

        <div class="details">
            <div class="detail-item">
                <span class="detail-num">一</span>
                <span class="detail-text">Observe</span>
            </div>
            <div class="detail-item">
                <span class="detail-num">二</span>
                <span class="detail-text">Render</span>
            </div>
            <div class="detail-item">
                <span class="detail-num">三</span>
                <span class="detail-text">Understand</span>
            </div>
        </div>
    </main>

    <footer>
        <p>VOID</p>
    </footer>
</body>
</html>
