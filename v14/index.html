<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID — v14</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="../" class="back">&larr; Gallery</a>
        <span class="version">v14</span>
    </nav>

    <main>
        <div class="black-hole">
            <div class="accretion-disk"></div>
            <div class="photon-ring"></div>
            <div class="event-horizon"></div>
        </div>

        <div class="split">
            <div class="left">
                <h1>BLACK<br>HOLE<br>DATA</h1>
            </div>
            <div class="right">
                <span class="label">Platform</span>
                <p class="intro">VOID transforms the invisible forces of the cosmos into breathtaking visual experiences.</p>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-num">4.3M</span>
                        <span class="stat-label">solar masses</span>
                    </div>
                    <div class="stat">
                        <span class="stat-num">26.7K</span>
                        <span class="stat-label">light-years</span>
                    </div>
                </div>
                <a href="#" class="cta">Enter VOID →</a>
            </div>
        </div>
    </main>
</body>
</html>
